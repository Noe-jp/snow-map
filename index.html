<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>除雪サポート・ストリートビュー</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
}

#pano {
  width: 100%;
  height: 100%;
}

/* 右上表示 */
#info {
  position: fixed;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 8px 10px;
  font-size: 13px;
  border-radius: 6px;
  z-index: 9999;
}
</style>
</head>

<body>

<div id="pano"></div>

<div id="info">
  残り読込（目安）:<br>
  <span id="remain">---</span> 回
</div>

<script>

// ===== 設定 =====
const API_KEY = "AIzaSyBgQc_elCwrKg5zCbIgRPktr-3fCefxjkw&callback=initMap";

const UPDATE_DISTANCE = 8;      // 8m以上で更新
const UPDATE_INTERVAL = 2000;  // 2秒

const MAX_ACCURACY = 15;       // 精度15m以下のみOK

// 無料枠計算
const PRICE_PER = 0.000014;
const FREE = 200;
const MAX_COUNT = Math.floor(FREE / PRICE_PER);


// ===== 変数 =====
let panorama = null;
let svService = null;

let lastLat = null;
let lastLng = null;
let lastTime = 0;

let viewCount = 0;


// ===== Google 読み込み =====
function loadGoogleMaps() {

  const script = document.createElement("script");

  script.src =
    "https://maps.googleapis.com/maps/api/js?key=" +
    API_KEY +
    "&callback=initMap";

  script.async = true;

  document.head.appendChild(script);
}

window.onload = loadGoogleMaps;


// ===== 距離 =====
function getDistance(lat1, lng1, lat2, lng2) {

  const R = 6371000;

  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) ** 2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLng/2) ** 2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}


// ===== 残り更新 =====
function updateRemain(){

  viewCount++;

  let remain = MAX_COUNT - viewCount;
  if (remain < 0) remain = 0;

  document.getElementById("remain").textContent =
    remain.toLocaleString();
}


// ===== 初期化 =====
function initMap() {

  const start = { lat: 37.9, lng: 139.0 };

  panorama = new google.maps.StreetViewPanorama(
    document.getElementById("pano"),
    {
      position: start,
      pov: { heading: 0, pitch: 0 },
      zoom: 1,

      addressControl: true,
      linksControl: false,
      panControl: false,
      zoomControl: false,
      fullscreenControl: false
    }
  );

  svService = new google.maps.StreetViewService();

  startGPS();
}


// ===== 道チェック =====
function hasStreetView(lat, lng, callback){

  svService.getPanorama(
    {
      location: { lat, lng },
      radius: 30
    },
    (data, status) => {

      callback(status === "OK");
    }
  );
}


// ===== GPS =====
function startGPS() {

  if (!navigator.geolocation) {
    alert("GPS未対応");
    return;
  }

  navigator.geolocation.watchPosition(

    pos => {

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const acc = pos.coords.accuracy;
      const now = Date.now();

      // 精度悪いなら無視
      if (acc > MAX_ACCURACY) return;

      // 初回
      if (lastLat === null) {

        lastLat = lat;
        lastLng = lng;
        lastTime = now;

        panorama.setPosition({ lat, lng });
        updateRemain();

        return;
      }

      const dist = getDistance(
        lastLat, lastLng,
        lat, lng
      );

      const timeDiff = now - lastTime;


      if (
        dist < UPDATE_DISTANCE &&
        timeDiff < UPDATE_INTERVAL
      ) return;


      // 道あるか確認
      hasStreetView(lat, lng, ok => {

        if (!ok) return;

        panorama.setPosition({ lat, lng });
        updateRemain();

        lastLat = lat;
        lastLng = lng;
        lastTime = now;

      });
    },

    err => {
      alert("GPSエラー：" + err.message);
    },

    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
}

</script>

</body>
</html>
