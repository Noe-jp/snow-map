<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Map Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
}

#map {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<div id="map"></div>

<script>
function initMap() {

  const pos = { lat: 37.9, lng: 139.0 };

  new google.maps.Map(document.getElementById("map"), {
    center: pos,
    zoom: 15
  });

}
</script>

<script
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBgQc_elCwrKg5zCbIgRPktr-3fCefxjkw&callback=initMap"
async defer></script>

</body>
</html>
