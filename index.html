<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>除雪サポートマップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
}

#pano {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<div id="pano"></div>

<script>

  
// 設定
const API_KEY = "AIzaSyBgQc_elCwrKg5zCbIgRPktr-3fCefxjkw&callback=initMap";


// Google Maps 読み込み
function loadGoogleMaps() {
  const script = document.createElement("script");
  script.src =
    "https://maps.googleapis.com/maps/api/js?key=" +
    API_KEY +
    "&callback=initMap";
  script.async = true;
  document.head.appendChild(script);
}

window.onload = loadGoogleMaps;


// メイン処理
let panorama = null;

function initMap() {

  // 仮の初期位置（新潟）
  const start = { lat: 37.9, lng: 139.0 };

  panorama = new google.maps.StreetViewPanorama(
    document.getElementById("pano"),
    {
      position: start,

      pov: {
        heading: 0,
        pitch: 0
      },

      zoom: 1,

      // UI制御
      addressControl: true,   // ← 住所ON
      linksControl: false,
      panControl: false,
      enableCloseButton: false,
      showRoadLabels: false,
      fullscreenControl: false,
      zoomControl: false
    }
  );

  startGPS();
}


// GPS追跡
function startGPS() {

  if (!navigator.geolocation) {
    alert("GPSが使えません");
    return;
  }

  navigator.geolocation.watchPosition(

    pos => {

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      const location = { lat, lng };

      // ストリートビュー移動
      panorama.setPosition(location);

    },

    err => {
      alert("GPSエラー：" + err.message);
    },

    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
}

</script>

</body>
</html>
