<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>除雪サポート・ストリートビュー</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
}

#pano {
  width: 100%;
  height: 100%;
}

/* 残り回数表示 */
#info {
  position: fixed;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 8px 10px;
  font-size: 13px;
  border-radius: 6px;
  z-index: 9999;
}
</style>
</head>

<body>

<div id="pano"></div>

<div id="info">
  残り読み込み回数（目安）:<br>
  <span id="remain">---</span> 回
</div>

<script>

// ===== 設定 =====
const API_KEY = "AIzaSyBgQc_elCwrKg5zCbIgRPktr-3fCefxjkw&callback=initMap";

const UPDATE_DISTANCE = 3;     
const UPDATE_INTERVAL = 1000;

// 料金目安
const PRICE_PER = 0.000014;
const FREE = 200;

// 最大回数（無料枠分）
const MAX_COUNT = Math.floor(FREE / PRICE_PER);


// ===== 変数 =====
let panorama = null;

let lastLat = null;
let lastLng = null;
let lastTime = 0;

let viewCount = 0;


// ===== Google Maps 読み込み =====
function loadGoogleMaps() {

  const script = document.createElement("script");

  script.src =
    "https://maps.googleapis.com/maps/api/js?key=" +
    API_KEY +
    "&callback=initMap";

  script.async = true;

  document.head.appendChild(script);
}

window.onload = loadGoogleMaps;


// ===== 距離計算 =====
function getDistance(lat1, lng1, lat2, lng2) {

  const R = 6371000;

  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) ** 2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLng/2) ** 2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}


// ===== 回数更新 =====
function updateRemain(){

  viewCount++;

  let remain = MAX_COUNT - viewCount;

  if (remain < 0) remain = 0;

  document.getElementById("remain").textContent =
    remain.toLocaleString();
}


// ===== 初期化 =====
function initMap() {

  // 初期位置（新潟）
  const start = {
    lat: 37.9,
    lng: 139.0
  };

  panorama = new google.maps.StreetViewPanorama(

    document.getElementById("pano"),

    {
      position: start,

      pov: {
        heading: 0,
        pitch: 0
      },

      zoom: 1,

      addressControl: true,
      linksControl: false,
      panControl: false,
      fullscreenControl: false,
      zoomControl: false,
      enableCloseButton: false,
      showRoadLabels: false
    }
  );

  updateRemain();

  startGPS();
}


// ===== GPS追跡 =====
function startGPS() {

  if (!navigator.geolocation) {
    alert("GPSが使えません");
    return;
  }

  navigator.geolocation.watchPosition(

    pos => {

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const now = Date.now();

      // 初回
      if (lastLat === null) {

        lastLat = lat;
        lastLng = lng;
        lastTime = now;

        panorama.setPosition({ lat, lng });
        updateRemain();

        return;
      }

      const dist = getDistance(
        lastLat, lastLng,
        lat, lng
      );

      const timeDiff = now - lastTime;


      if (
        dist >= UPDATE_DISTANCE ||
        timeDiff >= UPDATE_INTERVAL
      ) {

        panorama.setPosition({ lat, lng });
        updateRemain();

        lastLat = lat;
        lastLng = lng;
        lastTime = now;
      }
    },

    err => {
      alert("GPSエラー：" + err.message);
    },

    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
}

</script>

</body>
</html>
